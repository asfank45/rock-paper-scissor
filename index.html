<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
</head>
<body>
    <div class="heading">Rock Paper Scissor</div>
    <div class="choices">
        <div class="choice" id="rock"> <img src="/picture/rock.png" alt="ROCK"></div>
        <div class="choice" id="paper"><img src="/picture/paper.png" alt=""></div>
        <div class="choice" id="scissor"><img src="/picture/scissor.png" alt=""></div>   
            
                
        
    </div>
    <div class="scoreBoard">
        <div class="Score">
            <p id="userScore">0</p>
            <p>You</p>

        </div>
        <div class="Score">
            <p id="comScore">0</p>
            <p>Computer</p>
        </div>
    </div>
        <div class="msgContainer">
            <p id="msg">Play Your Move</p>
        </div>
    <script src="app.js"></script>
</body>
</html>
